<!DOCTYPE html>
<html lang="en">
<head>
    <title>HR Attrition Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }
        .card {
            border-radius: 15px;
        }
        .title {
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center title mb-4">HR Attrition Predictor</h2>

    <div class="card p-4 shadow-lg">

        <form action="/predict" method="post">

            <!-- Monthly Income -->
            <label>Monthly Income: <span id="income_val"></span></label>
            <input type="range" name="MonthlyIncome" min="1000" max="20000" step="100" class="form-range" oninput="income_val.innerText=this.value">

            <!-- OverTime -->
            <div class="mt-3">
                <label>OverTime</label>
                <select name="OverTime" class="form-control">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <!-- Age -->
            <label class="mt-3">Age: <span id="age_val"></span></label>
            <input type="range" name="Age" min="18" max="60" class="form-range" oninput="age_val.innerText=this.value">

            <!-- Daily Rate -->
            <label class="mt-3">Daily Rate: <span id="daily_val"></span></label>
            <input type="range" name="DailyRate" min="100" max="1500" class="form-range" oninput="daily_val.innerText=this.value">

            <!-- Total Working Years -->
            <label class="mt-3">Total Working Years: <span id="years_val"></span></label>
            <input type="range" name="TotalWorkingYears" min="0" max="40" class="form-range" oninput="years_val.innerText=this.value">

            <!-- Hourly Rate -->
            <label class="mt-3">Hourly Rate: <span id="hourly_val"></span></label>
            <input type="range" name="HourlyRate" min="10" max="200" class="form-range" oninput="hourly_val.innerText=this.value">

            <!-- Monthly Rate -->
            <label class="mt-3">Monthly Rate: <span id="monthly_val"></span></label>
            <input type="range" name="MonthlyRate" min="2000" max="30000" class="form-range" oninput="monthly_val.innerText=this.value">

            <!-- Years at Company -->
            <label class="mt-3">Years at Company: <span id="company_val"></span></label>
            <input type="range" name="YearsAtCompany" min="0" max="40" class="form-range" oninput="company_val.innerText=this.value">

            <!-- Distance -->
            <label class="mt-3">Distance From Home: <span id="distance_val"></span></label>
            <input type="range" name="DistanceFromHome" min="1" max="50" class="form-range" oninput="distance_val.innerText=this.value">

            <button type="submit" class="btn btn-primary w-100 mt-4">Predict</button>
        </form>

        {% if prediction_text %}
        <div class="alert alert-info text-center mt-4">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
