<!DOCTYPE html>
<html lang="en">
<head>
    <title>HR Attrition Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1f2937, #4f46e5);
            color: #ffffff;
        }

        .card {
            border-radius: 20px;
            background: #ffffff;
            color: #000;
        }

        .header {
            text-align:center;
            margin-bottom: 30px;
        }

        .headerh1 {
            font-weight: 600;
        }

        .slider-value {
            font-weight: bold;
            float: right;
        }

        .btn-primary {
            background: #4f46e5;
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .result-box {
            border-radius: 12px;
            padding: 15px;
            font-weight: 500;
        }
        
    </style>
</head>

<body>

<div class="container py-5">

    <!--HEADER-->
    <div class = "header">
        <h1> HR Attrition Predictor </h1>
        <p>
            Predict whether an employee is likely to leave the company.
        </p>

    </div>

    <!--CARD-->
    <div class="card shadow-lg p-4">
        
        <form action="/predict" method= "post">

            
            <!--Age-->
            <label class="mt-3>Age <span class="slider-value"id="age_val"></span></label>
            <input type="range" name="Age" min="18" max="60"
                class="form-range"
                oninput="age_val.innerText=this.value">

            <!--Total Working Years-->
            <label class="mt-3">Total Working Years <span class="slider-value" id="years_val"></span></label>
            <input type="range" name= "TotalWorkingYears" min="0" max="40"
                class="form-range"
                oninput="years_val.innerText=this.value">

            <!--Years at Company-->
            <label class="mt-3">Years at Company <span class= slider-value" id="company_val"></span></label>

            <!--Monthly Income-->
            <label>Monthly Income: Amount received (in USD) <span class="slider-value" id="income_val"</span></label>
            <input type="range" name= "MonthlyIncome" min="1000" max="20000" step="100"
                class="form-range"
                oninput="income_val.ineerText=this.value">

            <!--Hourly Rate-->
            <label class="mt-3">Hourly Rate (in USD)
                <span class="slider-value" id="hourly_val"></span></label>
                <input type="range" name="HourlyRate" min="10" max="200"
                    class="form-range"
                    oninput="hourly_val.innerText=this.value">

            <!--Daily Rate-->
            <label class="mt-3">Daily Rate (in USD)
                <span class="slider-value" id="daily_val"></span></label>
                <input type="range" name="DailyRate" min="100" max="1500"
                    class="form-range"
                    oninput="daily_val.innerText=this.value">

            <!--Monthly Rate-->
            <label class="mt-3">Monthly Rate: Basic salary guaranteed (in USD)
                <span class="slider-value" id="monthly_val"></span></label>
                <input type="range" name="MonthlyRate" min="2000" max="30000"
                    class="form-range"
                    oninput="monthly_val.innerText=this.value">

            <!--Distance-->
            <label class="mt-3">Distance From Home (in km)
                <span class="slider-value" id="distance_val"></span></label>
                <input type="range" name="DistanceFromHome" min="1" max="50"
                    class="form-range"
                    oninput="distance_val.innerText=this.value">

            <!--Overtime-->
            <div class="mt-4">
                <label>OverTime</label>
                <select name="OverTime" class="form-control">
                    <option value="0">No</option>
                    <option value="0">Yes</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4">
                Predict Attrition
            </button>
        </form>

        {% if prediction_text %}
        <div class="mt-4 text-center">
            <div class="result-box bg-light">
                {{prediction_text}}
            </div>
            {% endif %}

        </div>
    </div>
    </body>

    </html>
